name: Monthly Site Ping with Report

on:
  schedule:
    - cron: '0 0 */6 * *' # প্রতি ৬ দিন অন্তর অটো চলবে
  workflow_dispatch: # আপনি নিজেও ম্যানুয়ালি রান করতে পারবেন

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v3 থেকে v4 করা হয়েছে

      - name: Set up Python
        uses: actions/setup-python@v5 # v4 থেকে v5 করা হয়েছে
        with:
          python-version: '3.11' # একটু লেটেস্ট পাইথন ভার্সন

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python ping_sites.py

      - name: Commit and Push Report
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add report.csv detailed_status.csv
          git commit -m "Update Site Status Reports" || exit 0
          git push
